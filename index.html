      <button onclick="setTheme('light')" id="btn-light">Light</button>

      <button onclick="setTheme('system')" id="btn-system">System</button>

    <!-- INPUT PANEL -->
    <div class="card">

      <div class="drop-zone" id="dropZone">

        <div style="font-size:0.8rem; margin-top:6px; opacity:0.7;">Supports .txt .csv .html .json .md</div>

      <textarea id="input" placeholder="Paste raw text here…"></textarea>

      <div class="options">
        <label><input type="checkbox" id="uniqueOnly" checked> Unique</label>

        <label><input type="checkbox" id="stripSubdomains"> No subdomains</label>
      </div>

      <div class="controls">
        <button class="btn-primary" onclick="extractDomains()">Extract</button>
        <button class="btn-secondary" onclick="clearAll()">Clear</button>
        <button class="btn-secondary" onclick="loadSample()">Sample</button>
      </div>

    <!-- OUTPUT PANEL -->
    <div class="card output-wrap">

      <div class="stats-grid">
        <div class="stat">
          <div class="stat-value" id="countFound">0</div>
          <div class="stat-label">Found</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="countUnique">0</div>
          <div class="stat-label">Unique</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="countFiltered">0</div>
          <div class="stat-label">Showing</div>
        </div>
      </div>

      <input type="text" class="search-box" id="searchBox" placeholder="Filter results…" oninput="filterOutput()">

      <div class="tld-tags" id="tldTags"></div>

      <div class="chart" id="tldChart"></div>

      <textarea id="output" readonly placeholder="Extracted domains appear here…"></textarea>

      <div class="controls">
        <button class="btn-success" onclick="copyOutput()">Copy</button>
        <button class="btn-secondary" onclick="download('txt')">.txt</button>

  <div class="toast" id="toast">Copied!</div>

  <script>
    const $ = id => document.getElementById(id);
    let allDomains = [];      // raw extracted list
    let uniqueDomains = [];   // deduped list
    let filteredDomains = []; // after TLD + search filters

    const DOMAIN_RE = /(?:https?:\/\/)?(?:www\.)?([a-zA-Z0-9][a-zA-Z0-9\-]*\.[a-zA-Z0-9\-]{2,}(?:\.[a-zA-Z0-9\-]{2,})*)/gi;

    // ---------- THEME ----------
    function setTheme(mode) {
      if (mode === 'system') {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.body.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
      } else {
        document.body.setAttribute('data-theme', mode);
      }
      ['light','dark','system'].forEach(t => $(`btn-${t}`).classList.toggle('active', t === mode));
    }

    // ---------- FILE DROP ----------
    const dz = $('dropZone');
    dz.addEventListener('click', () => $('input').focus());
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        $('input').value = ev.target.result;
        extractDomains();
      };
      reader.readAsText(file);
    });

    // ---------- EXTRACTION ----------
    function extractDomains() {
      const raw = $('input').value;
      if (!raw.trim()) { showToast('Paste text or drop a file first', true); return; }

      // Regex pass
      const matches = [];
      let m;
      while ((m = DOMAIN_RE.exec(raw)) !== null) {
        matches.push(cleanDomain(m[1]));
      }

      // Line-scan pass (catches ALL-CAPS domains like SOVRAPARIS.COM)
      const LINE_RE = /^[A-Z0-9][A-Z0-9\-\.]*\.[A-Z]{2,}$/i;
      raw.split(/\r?\n/).forEach(line => {
        const t = line.trim();
        if (LINE_RE.test(t) && !t.includes('@') && t.length > 3) {
          const d = cleanDomain(t);
          if (!matches.some(x => x.toLowerCase() === d.toLowerCase())) matches.push(d);
        }
      });

      allDomains = matches;
      processAndRender();
    }

    function cleanDomain(d) {
      return d.replace(/^\./, '').replace(/\.$/, '').trim();
    }

    function processAndRender() {
      let list = [...allDomains];

      // Strip subdomains?
      if ($('stripSubdomains').checked) {
        list = list.map(d => {
          const parts = d.toLowerCase().split('.');
          if (parts.length > 2) return parts.slice(-2).join('.');
          return d;
        });
      }

      // Unique
      if ($('uniqueOnly').checked) {
        const seen = new Set();
        list = list.filter(d => {
          const k = d.toLowerCase();
          if (seen.has(k)) return false;
          seen.add(k);
          return true;
        });
      }

      // Lowercase
      if ($('lowerCase').checked) list = list.map(d => d.toLowerCase());

      // Sort
      if ($('sortAlpha').checked) {
        list.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
      }

      uniqueDomains = list;
      buildTLDFilters();
      filterOutput();
      $('countFound').textContent = allDomains.length;
      $('countUnique').textContent = uniqueDomains.length;
    }

    // ---------- TLD & CHART ----------
    function getTLD(domain) {
      const parts = domain.split('.');
      return parts.length >= 2 ? parts[parts.length - 1].toLowerCase() : '';
    }

    function buildTLDFilters() {
      const counts = {};
      uniqueDomains.forEach(d => {
        const tld = getTLD(d);
        counts[tld] = (counts[tld] || 0) + 1;
      });

      const container = $('tldTags');
      container.innerHTML = '';
      const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      sorted.forEach(([tld, count]) => {
        const tag = document.createElement('span');
        tag.className = 'tld-tag';
        tag.textContent = `.${tld} (${count})`;
        tag.dataset.tld = tld;
        tag.onclick = () => {
          tag.classList.toggle('active');
          filterOutput();
        };
        container.appendChild(tag);
      });

      // Chart top 6
      const chart = $('tldChart');
      chart.innerHTML = '';
      const max = sorted[0]?.[1] || 1;
      sorted.slice(0, 6).forEach(([tld, count]) => {
        const pct = (count / max) * 100;
        chart.innerHTML += `
          <div class="bar-row">
            <div class="bar-label">.${tld}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="bar-count">${count}</div>
          </div>`;
      });
    }

    // ---------- FILTER & RENDER ----------
    function filterOutput() {
      const query = $('searchBox').value.trim().toLowerCase();
      const activeTLDs = Array.from(document.querySelectorAll('.tld-tag.active')).map(t => t.dataset.tld);

      filteredDomains = uniqueDomains.filter(d => {
        const matchSearch = !query || d.toLowerCase().includes(query);
        const matchTLD = activeTLDs.length === 0 || activeTLDs.includes(getTLD(d));
        return matchSearch && matchTLD;
      });

      $('output').value = filteredDomains.join('\n');
      $('countFiltered').textContent = filteredDomains.length;
    }

    // ---------- ACTIONS ----------
    function clearAll() {
      $('input').value = '';
      $('output').value = '';
      $('searchBox').value = '';
      $('tldTags').innerHTML = '';
      $('tldChart').innerHTML = '';
      allDomains = []; uniqueDomains = []; filteredDomains = [];
      $('countFound').textContent = '0';
      $('countUnique').textContent = '0';
      $('countFiltered').textContent = '0';
    }

    function copyOutput() {
      const out = $('output');
      if (!out.value) return;
      out.select();
      document.execCommand('copy');
      showToast('Copied to clipboard!');
    }

    function download(fmt) {
      if (!filteredDomains.length) { showToast('Nothing to export', true); return; }
      let blob, filename, type;
      if (fmt === 'txt') {
        blob = new Blob([filteredDomains.join('\n')], { type: 'text/plain' });
        filename = 'domains.txt';
      } else if (fmt === 'csv') {
        const rows = filteredDomains.map(d => `${d},.${getTLD(d)},${d.length}`);
        blob = new Blob([`domain,tld,length\n${rows.join('\n')}`], { type: 'text/csv' });
        filename = 'domains.csv';
      } else {
        const json = filteredDomains.map(d => ({ domain: d, tld: getTLD(d), length: d.length }));
        blob = new Blob([JSON.stringify(json, null, 2)], { type: 'application/json' });
        filename = 'domains.json';
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
      showToast(`Downloaded ${filename}`);
    }
